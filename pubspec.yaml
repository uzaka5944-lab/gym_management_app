name: gym_management_app
description: "A complete gym management system."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Backend
  supabase_flutter: ^2.5.0

  # UI & Charts
  fl_chart: ^0.68.0 # For charts and graphs
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  cupertino_icons: ^1.0.6

  # Utilities
  intl: ^0.19.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  
  # File Generation
  pdf: ^3.10.8
  printing: ^5.12.0
  csv: ^6.0.0
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true