tasks:
  - name: Setup & Run Flutter
    init: |
      dart pub global activate fvm
      fvm install 3.22.0
      fvm use 3.22.0
      fvm flutter pub get
    command: |
      export PATH="$PATH":"$HOME/.pub-cache/bin"
      fvm flutter run -d web-server --web-port 8080 --web-hostname 0.0.0.0 --dart-define=SUPABASE_URL=$SUPABASE_URL --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY

ports:
  - port: 8080
    onOpen: open-preview
    visibility: public